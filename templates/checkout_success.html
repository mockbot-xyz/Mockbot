<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - ANSV Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .success-icon {
            color: #00CC66;
            font-size: 72px;
            margin-bottom: 24px;
            animation: bounce 1s ease;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="success-card">
        <i class="fas fa-check-circle success-icon"></i>
        <h1 class="mb-3">Payment Successful!</h1>
        <p class="lead mb-4">{{ message }}</p>
        <div class="alert alert-info">
            <i class="fas fa-info-circle me-2"></i>
            Your Premium subscription is now active. All TTS features are unlocked!
        </div>
        <a href="{{ url_for('beta_dashboard') }}" class="btn btn-primary btn-lg mt-3">
            <i class="fas fa-home me-2"></i>Go to Dashboard
        </a>
    </div>
</body>
</html>
