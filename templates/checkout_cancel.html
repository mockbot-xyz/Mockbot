<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Cancelled - ANSV Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cancel-card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .cancel-icon {
            color: #FFA500;
            font-size: 72px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="cancel-card">
        <i class="fas fa-times-circle cancel-icon"></i>
        <h1 class="mb-3">Checkout Cancelled</h1>
        <p class="lead mb-4">{{ message }}</p>
        <div class="alert alert-info">
            <i class="fas fa-info-circle me-2"></i>
            No charges were made to your account.
        </div>
        <div class="d-grid gap-2 mt-4">
            <a href="{{ url_for('premium_page') }}" class="btn btn-primary btn-lg">
                <i class="fas fa-star me-2"></i>Try Again
            </a>
            <a href="{{ url_for('beta_dashboard') }}" class="btn btn-outline-secondary">
                <i class="fas fa-home me-2"></i>Go to Dashboard
            </a>
        </div>
    </div>
</body>
</html>
